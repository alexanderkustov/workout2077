<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Split</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --surface: #111;
  --border: #1e1e1e;
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --text: #e8e8e8;
  --muted: #3a3a3a;
  --muted2: #777;
}

html, body { height: 100%; }

body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.app {
  display: grid;
  grid-template-columns: 1fr 260px;
  grid-template-rows: 56px 1fr;
  min-height: 100vh;
}

/* NAV */
.topnav {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 6px;
  color: var(--accent);
  text-shadow: 0 0 14px rgba(200,241,53,0.35);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 28px;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
}

.nav-week { color: var(--accent); font-size: 10px; }

.nav-pill {
  border: 1px solid var(--border);
  padding: 5px 12px;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--muted2);
}

/* MAIN */
.main {
  position: relative;
  overflow: hidden;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

/* Watermark */
.bg-text {
  position: absolute;
  bottom: -20px;
  left: -8px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(80px, 14vw, 180px);
  font-weight: 900;
  color: rgba(255,255,255,0.022);
  letter-spacing: 8px;
  pointer-events: none;
  user-select: none;
  white-space: nowrap;
  z-index: 0;
}

/* Day tabs */
.day-strip {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.day-tab {
  flex: 1;
  padding: 12px 4px;
  text-align: center;
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: background 0.12s;
}
.day-tab:last-child { border-right: none; }
.day-tab:hover { background: rgba(200,241,53,0.05); }
.day-tab.active { background: var(--accent); }
.day-tab.active .tab-s, .day-tab.active .tab-n { color: #000; }
.day-tab.rest-tab { opacity: 0.35; }
.day-tab.rest-tab.active { opacity: 1; }

.tab-s {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted2);
  text-transform: uppercase;
  display: block;
}
.tab-n {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted);
  display: block;
  margin-top: 2px;
}

/* Hero */
.hero {
  padding: 32px 36px 28px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: start;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.hero-index {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted2);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.hero-name {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(28px, 3.5vw, 48px);
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--text);
  line-height: 1;
  text-transform: uppercase;
}

.hero-cat {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent);
  margin-top: 8px;
}

.hero-chips {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-end;
}

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 9px 14px;
  min-width: 110px;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}

.chip-label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 3px;
}

.chip-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}

/* Exercise panel */
.ex-panel {
  padding: 4px 36px 36px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
  position: relative;
  z-index: 1;
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) #111;
}

.ex-row {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  align-items: center;
  gap: 0 16px;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-left: none;
  border-right: none;
  border-top: none;
  background: transparent;
  cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
  animation: fadeIn 0.3s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.ex-row:hover {
  border-color: rgba(200,241,53,0.25);
  background: rgba(200,241,53,0.03);
}
.ex-row:hover .ex-num { color: var(--accent); }

.ex-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  padding-top: 2px;
  flex-shrink: 0;
  transition: color 0.12s;
}

.ex-info {
  display: contents;
}

.ex-name {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.ex-sets {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--muted2);
  line-height: 1.6;
  text-align: right;
  white-space: nowrap;
}

.ex-tag {
  display: none;
}
.ex-tag.core { border-color: rgba(100,180,255,0.25); color: #64b4ff; background: rgba(100,180,255,0.05); }
.ex-tag.cardio { border-color: rgba(255,140,80,0.25); color: #ff8c50; background: rgba(255,140,80,0.05); }

/* SIDEBAR */
.sidebar {
  display: flex;
  flex-direction: column;
}

.sb-head {
  padding: 20px 18px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--accent);
}

.sb-head-label {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  margin-bottom: 6px;
}

.sb-head-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #000;
  text-transform: uppercase;
  line-height: 1.1;
}

.week-list { flex: 1; overflow-y: auto; }

.wi {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.wi:hover { background: rgba(200,241,53,0.04); }
.wi.active { background: rgba(200,241,53,0.07); }
.wi.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
}
.wi.rest { opacity: 0.38; }
.wi.rest.active { opacity: 1; }

.wi-day {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--muted2);
  width: 26px;
  flex-shrink: 0;
  text-transform: uppercase;
}
.wi.active .wi-day { color: var(--accent); }

.wi-info { flex: 1; }
.wi-name {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
}
.wi-cat {
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted2);
}

.wi-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--muted2);
}

/* Sidebar footer */
.sb-foot {
  padding: 18px;
  border-top: 1px solid var(--border);
}

.sb-foot-label {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 8px;
}

.sb-bar {
  height: 2px;
  background: var(--border);
  margin-bottom: 14px;
}

.sb-bar-fill {
  height: 100%;
  width: 57%;
  background: var(--accent);
  box-shadow: 0 0 8px rgba(200,241,53,0.4);
}

.sb-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.sb-stat-label {
  font-size: 7px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 2px;
}

.sb-stat-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 8px rgba(200,241,53,0.25);
}

.sb-stat-unit {
  font-size: 8px;
  color: var(--muted2);
  margin-left: 1px;
}

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(10px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal {
  background: #0d0d0d;
  border: 1px solid var(--accent);
  width: min(620px, 92vw);
  max-height: 86vh;
  overflow-y: auto;
  transform: translateY(18px);
  transition: transform 0.22s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) #111;
  box-shadow: 0 0 50px rgba(200,241,53,0.08);
}
.modal-bg.open .modal { transform: translateY(0); }

.modal-head {
  position: sticky;
  top: 0;
  background: var(--accent);
  padding: 22px 30px 18px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  z-index: 1;
}

.mh-label { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.45); margin-bottom: 4px; }
.mh-name { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: 3px; color: #000; text-transform: uppercase; line-height: 1; }
.mh-cat { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.55); margin-top: 5px; }

.modal-close {
  background: rgba(0,0,0,0.12);
  border: 1px solid rgba(0,0,0,0.15);
  color: #000;
  font-size: 16px;
  width: 30px; height: 30px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}
.modal-close:hover { background: rgba(0,0,0,0.25); }

.modal-body { padding: 4px 0 20px; }

.m-ex {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  align-items: center;
  gap: 0 18px;
  padding: 18px 30px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.m-ex:hover { background: rgba(200,241,53,0.025); }
.m-ex:last-child { border-bottom: none; }

.m-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: rgba(200,241,53,0.12);
  line-height: 1;
}

.m-name {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
  line-height: 1.3;
}

.m-sets {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted2);
  line-height: 1.8;
}

.m-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 7px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 7px;
  border: 1px solid rgba(200,241,53,0.2);
  color: var(--accent);
  background: rgba(200,241,53,0.05);
  white-space: nowrap;
  align-self: center;
}
.m-tag.core { border-color: rgba(100,180,255,0.25); color: #64b4ff; background: rgba(100,180,255,0.05); }
.m-tag.cardio { border-color: rgba(255,140,80,0.25); color: #ff8c50; background: rgba(255,140,80,0.05); }

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 48px auto 1fr;
  }

  .sidebar {
    order: -1;
    grid-row: 2;
    border-right: none;
    border-bottom: 1px solid var(--border);
  }

  .sb-head { padding: 14px 16px 12px; }
  .sb-head-title { font-size: 13px; }

  .week-list {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: none;
  }

  .week-list::-webkit-scrollbar { display: none; }

  .wi {
    flex-direction: column;
    align-items: center;
    padding: 10px 14px;
    border-bottom: none;
    border-right: 1px solid var(--border);
    min-width: 70px;
    text-align: center;
    gap: 4px;
  }

  .wi.active::before {
    top: auto;
    bottom: 0;
    left: 0; right: 0;
    width: 100%;
    height: 2px;
  }

  .wi-info { display: none; }
  .wi-badge { display: none; }

  .wi-day {
    width: auto;
    font-size: 9px;
    letter-spacing: 2px;
  }

  .sb-foot { display: none; }

  .main { border-right: none; grid-row: 3; }

  .bg-text { font-size: 60px; }

  .hero {
    padding: 20px 20px 16px;
    grid-template-columns: 1fr;
  }

  .hero-chips {
    flex-direction: row;
    align-items: flex-start;
    margin-top: 12px;
  }

  .chip {
    min-width: auto;
    flex: 1;
  }

  .hero-name { font-size: 28px; }

  .ex-panel {
    padding: 4px 20px 28px;
  }

  .ex-row {
    grid-template-columns: 28px 1fr auto;
    padding: 13px 0;
  }

  .ex-name { font-size: 12px; }

  .nav-right span:not(.nav-week) { display: none; }
  .nav-pill { display: none; }
}

@media (max-width: 420px) {
  .hero-chips { gap: 2px; }
  .chip { padding: 7px 10px; }
  .chip-val { font-size: 13px; }
}

</style>
</head>

<div class="app">

  <nav class="topnav">

    <div class="nav-right">

      </div>
    </div>
  </aside>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="mh-label" id="mh-label"></div>
        <div class="mh-name" id="mh-name"></div>
        <div class="mh-cat" id="mh-cat"></div>

      <button class="modal-close" id="modal-close">&times;</button>

    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

    ex:[
      {n:'Dumbbell Shoulder Press', s:'20 / 24 / 26 / 26 kg \u00d7 10\u201312 reps', t:''},
      {n:'Lateral Raise (Dumbbell)', s:'8 / 10 / 12 / 12 / 12 kg \u00d7 15\u201320 reps', t:''},
      {n:'Rear Delt Cable Fly', s:'10 / 12.5 / 15 / 15 kg \u00d7 15 reps / arm', t:''},
      {n:'Overhead Tricep Extension', s:'20 / 24 / 26 / 26 kg \u00d7 10\u201312 reps', t:''},
      {n:'Tricep Pushdown (Cable)', s:'25 / 30 / 35 / 35 kg \u00d7 12\u201315 reps', t:''},
      {n:'Dips (Tricep Focus)', s:'3 \u00d7 10\u201312 reps \u2014 bodyweight', t:''},
      {n:'Preacher Curl (Barbell)', s:'25 / 30 / 30 kg \u00d7 10\u201312 reps', t:''},
      {n:'Cable Curl', s:'15 / 20 / 20 kg \u00d7 12\u201315 reps', t:''},
      {n:'Hanging Leg Raise', s:'3 \u00d7 9\u201312 reps', t:'core'},
      {n:'Dead Hang', s:'1 \u00d7 60 sec', t:'finisher'},
    ]},
  { name:'Friday', short:'Fri', cat:'Posterior Chain + Core', idx:'DAY 05', sets:18, dur:'70 min',
    ex:[
      {n:'Romanian Deadlift (Barbell)', s:'60 / 80 / 100 / 100 kg \u00d7 8 reps', t:''},
      {n:'Hip Thrust (Barbell)', s:'80 / 100 / 120 kg \u00d7 10\u201312 reps', t:''},
      {n:'Stiff Leg Deadlift (Barbell)', s:'60 / 70 / 70 kg \u00d7 10 reps', t:''},
      {n:'Hanging Leg Raise', s:'3 \u00d7 10\u201312 reps', t:'core'},
      {n:'Cable Crunches', s:'30 / 35 / 35 kg \u00d7 15 reps', t:'core'},
      {n:'Treadmill / Cardio', s:'15\u201320 min steady state', t:'cardio'},
    ]},
  { name:'Saturday', short:'Sat', cat:'Cardio', idx:'DAY 06', sets:null, dur:'~30 min', rest:false,
    ex:[
      {n:'5km Run', s:'Steady state \u2014 Zone 2', t:'cardio'},
      {n:'Warm-up Walk', s:'5 min \u2014 pre run', t:''},
      {n:'Cool-down Stretch', s:'10 min \u2014 post run', t:''},
    ]},
  { name:'Sunday', short:'Sun', cat:'Rest Day', idx:'DAY 07', sets:null, dur:'\u2014', rest:true,
    ex:[{n:'Rest & Recovery', s:'Full day off \u2014 sleep, eat, recover', t:''}]},
];

let active = 0;

function tagEl(t, modal) {
  if (!t) return '';
  const cls = t === 'core' ? 'core' : t === 'cardio' ? 'cardio' : '';
  const lbl = t === 'finisher' ? (modal ? 'FINISHER' : 'FIN') : t.toUpperCase();
  return modal
    ? `<span class="m-tag ${cls}">${lbl}</span>`
    : `<span class="ex-tag ${cls}">${lbl}</span>`;
}

function render(idx) {
  const d = DAYS[idx];
  document.getElementById('bg-text').textContent = d.name.toUpperCase();
  document.getElementById('hero-index').innerHTML = `${d.idx} &mdash; ${d.cat.toUpperCase()}`;
  document.getElementById('hero-name').textContent = d.name;
  document.getElementById('hero-cat').textContent = d.cat;

  document.getElementById('hero-chips').innerHTML = `
    <div class="chip"><div class="chip-label">Duration</div><div class="chip-val">${d.dur}</div></div>
    <div class="chip"><div class="chip-label">Volume</div><div class="chip-val">${d.sets ? d.sets+' sets' : '\u2014'}</div></div>
    <div class="chip"><div class="chip-label">Exercises</div><div class="chip-val">${d.ex.length}</div></div>
  `;

  document.getElementById('ex-panel').innerHTML = d.ex.map((e, i) =>
    `<div class="ex-row" style="animation-delay:${i*0.035}s" onclick="openModal(${idx})">
      <span class="ex-num">${String(i+1).padStart(2,'0')}</span>
      <div class="ex-name">${e.n}</div>
      <div class="ex-sets">${e.s}</div>
    </div>`
  ).join('');

  // sidebar
  document.getElementById('week-list').innerHTML = DAYS.map((dd, i) =>
    `<div class="wi ${dd.rest ? 'rest' : ''} ${i===idx?'active':''}" onclick="switchDay(${i})">
      <span class="wi-day">${dd.short}</span>
      <div class="wi-info">
        <div class="wi-name">${dd.name}</div>
        <div class="wi-cat">${dd.cat}</div>
      </div>
      <span class="wi-badge">${dd.sets ? dd.sets+'s' : dd.rest ? 'REST' : 'RUN'}</span>
    </div>`
  ).join('');

  // tabs
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
}

function switchDay(i) { active = i; render(i); }

document.querySelectorAll('.day-tab').forEach(t => {
  t.addEventListener('click', () => switchDay(+t.dataset.day));
});

function openModal(idx) {
  const d = DAYS[idx];
  document.getElementById('mh-label').textContent = d.idx;
  document.getElementById('mh-name').textContent = d.name;
  document.getElementById('mh-cat').textContent = d.cat;
  document.getElementById('modal-body').innerHTML = d.ex.map((e,i) =>
    `<div class="m-ex">
      <div class="m-num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="m-name">${e.n}</div>
        <div class="m-sets">${e.s}</div>
      </div>
      ${tagEl(e.t, true)}
    </div>`
  ).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===document.getElementById('modal-bg')) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

render(0);
</script>
</body>
</html>
