<!DOCTYPE html>
<html lang="en">
<head>

<title>SPLIT.SYS • 404</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<body>
  <main class="error-shell">
    <header class="error-head">
      <div class="kicker">SPLIT.SYS // ROUTE ERROR</div>

      <p class="message">The route you requested does not exist in this build. Check the URL, then retry.</p>

      <div class="actions">
        <a class="btn" href="./index.html">Open Workout</a>
        <a class="btn" href="./admin/">Open Admin</a>
      </div>
    </section>
  </main>
