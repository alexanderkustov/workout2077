<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPLIT.SYS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #0e0e0e;
  --border: #202020;
  --accent: #c8f135;
  --text: #e0e0e0;
  --muted: #3a3a3a;
  --muted2: #666;
}

html, body { min-height: 100%; }

body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ── LAYOUT ─────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 1fr 280px;
  grid-template-rows: 60px 1fr;
  min-height: 100vh;
}

/* ── TOP BAR ────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--accent);
}

.tb-logo {
  display: flex;
  align-items: center;
  padding: 0 28px 0 24px;
  background: var(--accent);
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 100%, 0 100%);
  padding-right: 44px;
  flex-shrink: 0;
}

.tb-logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 5px;
  color: #000;
}

.tb-meta {
  display: flex;
  align-items: center;
  flex: 1;
}

.tb-item {
  padding: 0 24px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}

.tb-item-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 3px;
}

.tb-item-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}

.tb-status {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 24px;
}

.status-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

.status-txt {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
}

/* ── MAIN ───────────────────────────────── */
.main {
  position: relative;
  overflow: hidden;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}

.bg-text {
  position: absolute;
  bottom: -20px;
  left: -10px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(80px, 12vw, 160px);
  font-weight: 900;
  color: rgba(200,241,53,0.035);
  letter-spacing: 8px;
  pointer-events: none;
  user-select: none;
  white-space: nowrap;
  z-index: 0;
}

/* ── DAY STRIP ──────────────────────────── */
.day-strip {
  display: flex;
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.day-tab {
  flex: 1;
  padding: 14px 4px 12px;
  text-align: center;
  cursor: pointer;
  border-right: 1px solid var(--border);
  transition: background 0.12s;
}
.day-tab:last-child { border-right: none; }
.day-tab:hover { background: rgba(200,241,53,0.06); }
.day-tab.active { background: var(--accent); }
.day-tab.active .tab-s, .day-tab.active .tab-n { color: #000; }
.day-tab.rest-tab { opacity: 0.3; }
.day-tab.rest-tab.active { opacity: 1; }

.tab-s {
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--muted2);
  text-transform: uppercase;
  display: block;
}
.tab-n {
  font-size: 9px;
  color: var(--muted);
  display: block;
  margin-top: 3px;
}

/* ── HERO ───────────────────────────────── */
.hero {
  position: relative;
  z-index: 1;
  border-bottom: 1px solid var(--border);
}

.hero-accent-bar {
  background: var(--accent);
  padding: 16px 28px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
}

.hero-day-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,0,0,0.5);
  text-transform: uppercase;
}

.hero-cat-badge {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.6);
  border: 1px solid rgba(0,0,0,0.2);
  padding: 3px 12px;
}

.hero-name-row {
  padding: 20px 28px 4px;
}

.hero-name {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(36px, 4.5vw, 58px);
  font-weight: 900;
  letter-spacing: 5px;
  color: var(--text);
  text-transform: uppercase;
  line-height: 1;
}

.hero-chip-row {
  display: flex;
  gap: 3px;
  padding: 16px 28px 20px;
}

.hchip {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 2px solid var(--accent);
  padding: 12px 16px;
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
}

.hchip-label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 5px;
}

.hchip-val {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  text-shadow: 0 0 12px rgba(200,241,53,0.3);
}

/* ── EXERCISE LIST ──────────────────────── */
.ex-panel {
  position: relative;
  z-index: 1;
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) #111;
}

.ex-section-label {
  padding: 10px 28px 8px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.ex-section-label::before { content: '//'; color: var(--accent); font-size: 11px; }

.ex-row {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  align-items: center;
  gap: 0 16px;
  padding: 18px 28px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  animation: slideIn 0.25s ease both;
  position: relative;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

.ex-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--accent);
  transition: width 0.1s;
}
.ex-row:hover { background: rgba(200,241,53,0.04); }
.ex-row:hover::before { width: 3px; }
.ex-row:hover .ex-num { color: var(--accent); }

.ex-num {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 1px;
  transition: color 0.1s;
}

.ex-name {
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.ex-sets {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted2);
  text-align: right;
  line-height: 1.7;
  white-space: nowrap;
}

/* ── SIDEBAR ────────────────────────────── */
.sidebar {
  display: flex;
  flex-direction: column;
}

.sb-head {
  background: var(--accent);
  padding: 20px 18px 16px;
  clip-path: polygon(0 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%);
}

.sb-head-sys {
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(0,0,0,0.45);
  margin-bottom: 5px;
}

.sb-head-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #000;
  text-transform: uppercase;
  line-height: 1.1;
}

.sb-head-sub {
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(0,0,0,0.4);
  margin-top: 5px;
  text-transform: uppercase;
}

.sb-circuit {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.circuit-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), var(--accent), var(--border)); }
.circuit-node { width: 6px; height: 6px; border: 1px solid var(--accent); transform: rotate(45deg); }

.week-list { flex: 1; overflow-y: auto; scrollbar-width: none; }

.wi {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.1s;
  position: relative;
}
.wi:hover { background: rgba(200,241,53,0.05); }
.wi.active { background: rgba(200,241,53,0.08); }
.wi.active::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--accent);
}
.wi.rest { opacity: 0.32; }
.wi.rest.active { opacity: 1; }

.wi-idx {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--muted2);
  width: 26px;
  flex-shrink: 0;
  text-transform: uppercase;
}
.wi.active .wi-idx { color: var(--accent); }

.wi-info { flex: 1; }
.wi-name { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.wi-cat { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); }

.wi-vol { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted2); text-align: right; }
.wi.active .wi-vol { color: var(--accent); }

.sb-foot { border-top: 1px solid var(--border); }

.sb-progress-bar { height: 3px; background: var(--border); }
.sb-progress-fill { height: 100%; width: 57%; background: var(--accent); box-shadow: 0 0 10px rgba(200,241,53,0.5); }

.sb-stats-grid { display: grid; grid-template-columns: 1fr 1fr; }

.sb-stat {
  padding: 12px 14px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.sb-stat:nth-child(2n) { border-right: none; }
.sb-stat-label { font-size: 7px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); margin-bottom: 4px; }
.sb-stat-val { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); text-shadow: 0 0 8px rgba(200,241,53,0.25); }
.sb-stat-unit { font-size: 8px; color: var(--muted2); margin-left: 2px; }

/* ── MODAL ──────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(10px);
  z-index: 400;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.18s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--bg);
  border: 1px solid var(--accent);
  width: min(640px, 94vw);
  max-height: 88vh;
  overflow-y: auto;
  transform: scale(0.96);
  transition: transform 0.2s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) #111;
  box-shadow: 0 0 60px rgba(200,241,53,0.1);
  clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 18px 100%, 0 calc(100% - 18px));
}
.modal-bg.open .modal { transform: scale(1); }

.modal-head {
  background: var(--accent);
  padding: 24px 32px 20px;
  display: flex; align-items: flex-start; justify-content: space-between;
  clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 18px, 100% 100%, 0 100%);
}
.mh-sys { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.4); margin-bottom: 6px; }
.mh-name { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; letter-spacing: 3px; color: #000; text-transform: uppercase; line-height: 1; }
.mh-cat { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.5); margin-top: 5px; }

.modal-close {
  background: rgba(0,0,0,0.12);
  border: 1px solid rgba(0,0,0,0.2);
  color: #000; font-size: 18px;
  width: 34px; height: 34px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Share Tech Mono', monospace; flex-shrink: 0;
}
.modal-close:hover { background: rgba(0,0,0,0.28); }

.modal-body { padding: 0; }

.m-ex {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  align-items: center;
  gap: 0 18px;
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  position: relative;
}
.m-ex::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0; background: var(--accent);
  transition: width 0.1s;
}
.m-ex:hover { background: rgba(200,241,53,0.03); }
.m-ex:hover::before { width: 3px; }
.m-ex:last-child { border-bottom: none; }

.m-num { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 900; color: rgba(200,241,53,0.1); line-height: 1; }
.m-name { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.2; }
.m-sets { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted2); line-height: 1.9; }

.m-tag { font-family: 'Share Tech Mono', monospace; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; padding: 3px 8px; border: 1px solid rgba(200,241,53,0.2); color: var(--accent); background: rgba(200,241,53,0.05); white-space: nowrap; align-self: center; }
.m-tag.core { border-color: rgba(100,180,255,0.25); color: #64b4ff; background: rgba(100,180,255,0.05); }
.m-tag.cardio { border-color: rgba(255,140,80,0.25); color: #ff8c50; background: rgba(255,140,80,0.05); }

/* ══════════════════════════════════════════
   MOBILE — full rethink for phone legibility
   ══════════════════════════════════════════ */
@media (max-width: 768px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px auto 1fr;
    min-height: 100vh;
  }

  /* Move sidebar to row 2 as a compact strip */
  .sidebar {
    grid-row: 2;
    order: 1;
    border-top: none;
    border-bottom: 1px solid var(--border);
  }

  .main {
    grid-row: 3;
    order: 2;
    border-right: none;
  }

  /* Sidebar becomes horizontal scroll nav */
  .sb-head { display: none; }
  .sb-circuit { display: none; }
  .sb-foot { display: none; }

  .week-list {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .week-list::-webkit-scrollbar { display: none; }

  .wi {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 80px;
    padding: 14px 10px;
    border-bottom: none;
    border-right: 1px solid var(--border);
    gap: 5px;
    text-align: center;
  }
  .wi:last-child { border-right: none; }

  /* Active indicator: bottom bar */
  .wi.active::after {
    top: auto; right: 0; left: 0;
    bottom: 0; width: 100%; height: 3px;
  }

  .wi-idx {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    width: auto;
    color: var(--muted2);
  }
  .wi.active .wi-idx { color: var(--accent); }

  /* Show short day name below the abbrev */
  .wi-info { display: block; }
  .wi-name { display: none; }
  .wi-cat {
    font-size: 8px;
    letter-spacing: 0;
    color: var(--muted2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 72px;
  }
  .wi.active .wi-cat { color: var(--accent); opacity: 0.7; }
  .wi-vol { display: none; }

  /* Hero */
  .hero-accent-bar {
    padding: 14px 20px 12px;
    clip-path: none;
  }
  .hero-day-label { font-size: 11px; letter-spacing: 2px; }
  .hero-cat-badge { font-size: 12px; letter-spacing: 2px; padding: 3px 10px; }

  .hero-name-row { padding: 18px 20px 4px; }
  .hero-name { font-size: 36px; letter-spacing: 3px; }

  .hero-chip-row {
    display: none;
  }

  .bottom-bar {
    display: flex !important;
  }

  /* Day strip — bigger tap targets */
  .day-strip { display: none; } /* replaced by sidebar week-list on mobile */

  /* Exercises — big, legible */
  .ex-section-label { padding: 12px 20px 10px; font-size: 10px; }

  .ex-row {
    grid-template-columns: 48px 1fr;
    grid-template-rows: auto auto;
    gap: 0 14px;
    padding: 22px 20px;
    border-bottom-width: 1px;
  }

  .ex-num {
    grid-row: 1 / 3;
    font-size: 15px;
    align-self: center;
  }

  .ex-name {
    font-size: 20px;
    font-weight: 600;
    grid-column: 2;
    grid-row: 1;
    padding-bottom: 6px;
    line-height: 1.25;
  }

  .ex-sets {
    font-size: 14px;
    text-align: left;
    white-space: normal;
    grid-column: 2;
    grid-row: 2;
    color: var(--muted2);
    line-height: 1.65;
  }

  /* Topbar */
  .tb-logo { padding: 0 18px; padding-right: 32px; }
  .tb-logo-text { font-size: 13px; letter-spacing: 3px; }
  .tb-item:nth-child(n+2) { display: none; }
  .tb-status { padding: 0 16px; }

  /* Modal */
  .modal {
    clip-path: none;
    width: 100%;
    max-height: 92vh;
    align-self: flex-end;
    border-left: none;
    border-right: none;
    border-bottom: none;
    border-radius: 0;
  }
  .modal-bg { align-items: flex-end; }
  .modal-head { clip-path: none; padding: 20px 24px 16px; }
  .mh-name { font-size: 22px; }

  .m-ex {
    grid-template-columns: 48px 1fr;
    grid-template-rows: auto auto;
    gap: 0 14px;
    padding: 18px 24px;
  }
  .m-num { grid-row: 1 / 3; font-size: 22px; align-self: center; }
  .m-name { grid-column: 2; grid-row: 1; font-size: 20px; padding-bottom: 6px; }
  .m-sets { grid-column: 2; grid-row: 2; font-size: 14px; line-height: 1.85; }
  .m-tag { display: none; }
}

@media (max-width: 400px) {
  .hero-name { font-size: 28px; }
  .hchip-val { font-size: 15px; }
  .ex-name { font-size: 18px; }
  .ex-sets { font-size: 13px; }
}

  /* ── BOTTOM STATS BAR (mobile only) ──── */
  .bottom-bar {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    border-top: 2px solid var(--accent);
    background: #0a0a0a;
  }

  .bottom-bar-inner {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
  }

  .bb-chip {
    padding: 14px 16px 18px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .bb-chip:last-child { border-right: none; }

  .bb-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 5px;
  }

  .bb-val {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 10px rgba(200,241,53,0.3);
    line-height: 1;
  }

  /* push ex-panel content up so it doesn't hide behind bottom bar */
  @media (max-width: 768px) {
    .ex-panel { padding-bottom: 80px; }
  }

</style>
</head>
<body>

<div class="app">

  <nav class="topbar">
    <div class="tb-logo"><span class="tb-logo-text">SPLIT.SYS</span></div>
    <div class="tb-meta">
      <div class="tb-item">
        <div class="tb-item-label">Cycle</div>

        <div class="sb-stat"><div class="sb-stat-label">Train / wk</div><div class="sb-stat-val">5</div></div>
        <div class="sb-stat"><div class="sb-stat-label">Avg min</div><div class="sb-stat-val">75</div></div>
        <div class="sb-stat"><div class="sb-stat-label">Total sets</div><div class="sb-stat-val">68</div></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="mh-sys" id="mh-sys">// WORKOUT LOG</div>
        <div class="mh-name" id="mh-name">Monday</div>
        <div class="mh-cat" id="mh-cat">Upper Body</div>
      </div>
      <button class="modal-close" id="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DAYS = [
  { name:'Monday', short:'Mon', cat:'Upper Body', idx:'DAY 01', sets:32, dur:'80 min',
    ex:[
      {n:'Flat Barbell Bench Press', s:'60 / 80 / 90 / 95 kg \u00d7 6\u20138 reps', t:''},
      {n:'Incline Dumbbell Press', s:'24 / 28 / 30 / 30 kg \u00d7 8\u201310 reps', t:''},
      {n:'Dips (Chest Focus)', s:'3 \u00d7 8\u201310 reps \u2014 bodyweight', t:''},
      {n:'Cable Fly Crossovers', s:'12.5 / 15 / 17.5 kg \u00d7 12\u201315 reps', t:''},
      {n:'Overhead Press (Barbell)', s:'40 / 50 / 55 / 55 kg \u00d7 6\u20138 reps', t:''},
      {n:'Lateral Raise (Dumbbell)', s:'8 / 10 / 12 / 12 kg \u00d7 15\u201320 reps', t:''},
      {n:'Tricep Pushdown (Cable)', s:'25 / 30 / 35 kg \u00d7 12\u201315 reps', t:''},
      {n:'Dead Hang', s:'1 \u00d7 60 sec', t:'finisher'},
    ]},
  { name:'Tuesday', short:'Tue', cat:'Lower Body', idx:'DAY 02', sets:30, dur:'75 min',
    ex:[
      {n:'Hack Squat (Machine)', s:'80 / 100 / 110 / 110 kg \u00d7 10 reps', t:''},
      {n:'Leg Press (Machine)', s:'180 / 220 / 230 kg \u00d7 12 reps', t:''},
      {n:'Leg Extensions (Machine)', s:'40 / 50 / 55 kg \u00d7 12\u201315 reps', t:''},
      {n:'Walking Lunges (Dumbbell)', s:'15 / 18 / 20 kg \u00d7 12 reps / leg', t:''},
      {n:'Seated Leg Curl (Machine)', s:'55 / 60 / 65 kg \u00d7 12 reps', t:''},
      {n:'Lying Leg Curl (Machine)', s:'35 / 40 / 45 kg \u00d7 12 reps', t:''},
      {n:'Standing Calf Raise', s:'80 / 90 / 95 / 95 kg \u00d7 12\u201315 reps', t:''},
      {n:'Dead Hang', s:'1 \u00d7 60 sec', t:'finisher'},
    ]},
  { name:'Wednesday', short:'Wed', cat:'Pull \u2014 Back & Biceps', idx:'DAY 03', sets:30, dur:'75 min',
    ex:[
      {n:'Weighted Pull-Ups (Wide Grip)', s:'0 / 5 / 10 / 10 kg \u00d7 6\u20138 reps', t:''},
      {n:'Barbell Row', s:'60 / 80 / 90 / 90 kg \u00d7 8\u201310 reps', t:''},
      {n:'Seated Cable Row', s:'50 / 60 / 65 kg \u00d7 10\u201312 reps', t:''},
      {n:'Single Arm Lat Pulldown', s:'30 / 35 / 35 kg \u00d7 10\u201312 reps', t:''},
      {n:'Face Pulls (Cable)', s:'20 / 25 / 25 kg \u00d7 15\u201320 reps', t:''},
      {n:'Barbell Curl', s:'25 / 30 / 30 / 30 kg \u00d7 8\u201310 reps', t:''},
      {n:'Hammer Curl (Dumbbell)', s:'12 / 15 / 15 kg \u00d7 10\u201312 reps', t:''},
      {n:'Dead Hang', s:'1 \u00d7 60 sec', t:'finisher'},
    ]},
  { name:'Thursday', short:'Thu', cat:'Delts + Arms', idx:'DAY 04', sets:34, dur:'90 min',
    ex:[
      {n:'Dumbbell Shoulder Press', s:'20 / 24 / 26 / 26 kg \u00d7 10\u201312 reps', t:''},
      {n:'Lateral Raise (Dumbbell)', s:'8 / 10 / 12 / 12 / 12 kg \u00d7 15\u201320 reps', t:''},
      {n:'Rear Delt Cable Fly', s:'10 / 12.5 / 15 / 15 kg \u00d7 15 / arm', t:''},
      {n:'Overhead Tricep Extension', s:'20 / 24 / 26 / 26 kg \u00d7 10\u201312 reps', t:''},
      {n:'Tricep Pushdown (Cable)', s:'25 / 30 / 35 / 35 kg \u00d7 12\u201315 reps', t:''},
      {n:'Dips (Tricep Focus)', s:'3 \u00d7 10\u201312 reps \u2014 bodyweight', t:''},
      {n:'Preacher Curl (Barbell)', s:'25 / 30 / 30 kg \u00d7 10\u201312 reps', t:''},
      {n:'Cable Curl', s:'15 / 20 / 20 kg \u00d7 12\u201315 reps', t:''},
      {n:'Hanging Leg Raise', s:'3 \u00d7 9\u201312 reps', t:'core'},
      {n:'Dead Hang', s:'1 \u00d7 60 sec', t:'finisher'},
    ]},
  { name:'Friday', short:'Fri', cat:'Posterior Chain + Core', idx:'DAY 05', sets:18, dur:'70 min',
    ex:[
      {n:'Romanian Deadlift (Barbell)', s:'60 / 80 / 100 / 100 kg \u00d7 8 reps', t:''},
      {n:'Hip Thrust (Barbell)', s:'80 / 100 / 120 kg \u00d7 10\u201312 reps', t:''},
      {n:'Stiff Leg Deadlift (Barbell)', s:'60 / 70 / 70 kg \u00d7 10 reps', t:''},
      {n:'Hanging Leg Raise', s:'3 \u00d7 10\u201312 reps', t:'core'},
      {n:'Cable Crunches', s:'30 / 35 / 35 kg \u00d7 15 reps', t:'core'},
      {n:'Treadmill / Cardio', s:'15\u201320 min steady state', t:'cardio'},
    ]},
  { name:'Saturday', short:'Sat', cat:'Cardio', idx:'DAY 06', sets:null, dur:'~30 min',
    ex:[
      {n:'5km Run', s:'Steady state \u2014 Zone 2', t:'cardio'},
      {n:'Warm-up Walk', s:'5 min \u2014 pre run', t:''},
      {n:'Cool-down Stretch', s:'10 min \u2014 post run', t:''},
    ]},
  { name:'Sunday', short:'Sun', cat:'Rest Day', idx:'DAY 07', sets:null, dur:'\u2014', rest:true,
    ex:[{n:'Rest & Recovery', s:'Full day off \u2014 sleep, eat, recover', t:''}]},
];

let active = 0;

function tagEl(t) {
  if (!t) return '';
  const cls = t === 'core' ? 'core' : t === 'cardio' ? 'cardio' : '';
  const lbl = t === 'finisher' ? 'FINISHER' : t.toUpperCase();
  return `<span class="m-tag ${cls}">${lbl}</span>`;
}

function render(idx) {
  const d = DAYS[idx];

  document.getElementById('bg-text').textContent = d.name.toUpperCase();
  document.getElementById('hero-label').textContent = `${d.idx} \u2014 ${d.name.toUpperCase()}`;
  document.getElementById('hero-cat-badge').textContent = d.cat.toUpperCase();
  document.getElementById('hero-name').textContent = d.name;

  const chipsHtml = `
    <div class="hchip"><div class="hchip-label">Duration</div><div class="hchip-val">${d.dur}</div></div>
    <div class="hchip"><div class="hchip-label">Volume</div><div class="hchip-val">${d.sets ? d.sets + ' sets' : '\u2014'}</div></div>
    <div class="hchip"><div class="hchip-label">Exercises</div><div class="hchip-val">${d.ex.length}</div></div>
  `;
  document.getElementById('hero-chips').innerHTML = chipsHtml;

  const bbHtml = `
    <div class="bb-chip"><div class="bb-label">Duration</div><div class="bb-val">${d.dur}</div></div>
    <div class="bb-chip"><div class="bb-label">Volume</div><div class="bb-val">${d.sets ? d.sets + 's' : '\u2014'}</div></div>
    <div class="bb-chip"><div class="bb-label">Exercises</div><div class="bb-val">${d.ex.length}</div></div>
  `;
  document.getElementById('bottom-bar-inner').innerHTML = bbHtml;

  document.getElementById('ex-panel').innerHTML =
    `<div class="ex-section-label">EXERCISES // ${d.idx} ${d.cat.toUpperCase()}</div>` +
    d.ex.map((e, i) =>
      `<div class="ex-row" style="animation-delay:${i * 0.03}s" onclick="openModal(${idx})">
        <span class="ex-num">${String(i+1).padStart(2,'0')}</span>
        <div class="ex-name">${e.n}</div>
        <div class="ex-sets">${e.s}</div>
      </div>`
    ).join('');

  document.getElementById('week-list').innerHTML = DAYS.map((dd, i) =>
    `<div class="wi ${dd.rest ? 'rest' : ''} ${i === idx ? 'active' : ''}" onclick="switchDay(${i})">
      <span class="wi-idx">${dd.short}</span>
      <div class="wi-info">
        <div class="wi-name">${dd.name}</div>
        <div class="wi-cat">${dd.cat}</div>
      </div>
      <div class="wi-vol">${dd.sets ? dd.sets + 's' : dd.rest ? 'REST' : 'RUN'}</div>
    </div>`
  ).join('');

  document.querySelectorAll('.day-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
}

function switchDay(i) { active = i; render(i); }

document.querySelectorAll('.day-tab').forEach(t => {
  t.addEventListener('click', () => switchDay(+t.dataset.day));
});

function openModal(idx) {
  const d = DAYS[idx];
  document.getElementById('mh-sys').textContent = `// WORKOUT LOG \u2014 ${d.idx}`;
  document.getElementById('mh-name').textContent = d.name;
  document.getElementById('mh-cat').textContent = d.cat;
  document.getElementById('modal-body').innerHTML = d.ex.map((e, i) =>
    `<div class="m-ex">
      <div class="m-num">${String(i+1).padStart(2,'0')}</div>
      <div>
        <div class="m-name">${e.n}</div>
        <div class="m-sets">${e.s}</div>
      </div>
      ${tagEl(e.t)}
    </div>`
  ).join('');
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Map JS day (0=Sun, 1=Mon ... 6=Sat) to our DAYS array index
const jsDayToIdx = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 0:6 };
const todayIdx = jsDayToIdx[new Date().getDay()];
render(todayIdx);
</script>
</body>
</html>
